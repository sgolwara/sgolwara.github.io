---
layout: default
title: Essays
permalink: /essays/
---

<h2 class="section-heading">Essays</h2>
<ul class="piece-list">
  {% assign sorted = site.essays | sort: 'date' | reverse %}
  {% for piece in sorted %}
  <li>
    <a href="{{ piece.url | relative_url }}">{{ piece.title }}</a>
    <span class="piece-date">{{ piece.date | date: "%b %-d, %Y" }}</span>
  </li>
  {% endfor %}
</ul>
